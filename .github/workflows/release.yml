name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            args: --bundles nsis --target x86_64-pc-windows-msvc
          - os: macos-latest
            target: universal-apple-darwin
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            args: --bundles app,dmg --target universal-apple-darwin --config src-tauri/tauri.macos.conf.json

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Download yt-dlp binary
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          if [ "$RUNNER_OS" = "macOS" ]; then
            curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o src-tauri/resources/yt-dlp
            chmod +x src-tauri/resources/yt-dlp
            echo "Downloaded yt-dlp for macOS"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o src-tauri/resources/yt-dlp.exe
            echo "Downloaded yt-dlp.exe for Windows"
          fi

      - name: Install dependencies
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Base64 .p12 (e.g. openssl base64 -A -in Key.p12). Tauri infers signing identity; do not commit the key.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Qooti ${{ github.ref_name }}"
          releaseBody: |
            ## macOS (beta): Spotlight search

            Ad-hoc signed builds may take a few minutes to appear in Spotlight after install. To reindex immediately:

            ```bash
            sudo mdutil -E /Applications
            ```

            Confirm the bundle is recognized (should show **Qooti**):

            ```bash
            mdls /Applications/Qooti.app | grep kMDItemDisplayName
            ```

            If `mdls` returns nothing, drag **Qooti.app** into `/Applications` (do not run from the DMG). You can also run `touch /Applications/Qooti.app`, wait ~2 minutes, then search with **Cmd+Space**.

            ---
            See repository changelog for other release details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Ad-hoc signing only when no Apple .p12 is configured; otherwise it would replace real signatures.
      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE == ''
        run: |
          APP_PATH=$(find src-tauri/target -name "Qooti.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/target -name "qooti.app" -type d | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Qooti.app not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # Remove quarantine attribute first
          xattr -cr "$APP_PATH"

          # Ad-hoc sign recursively
          codesign --force --deep --sign - "$APP_PATH"

          # Touch the bundle to update timestamp
          # This is critical for Spotlight indexing
          touch "$APP_PATH"

          # Verify signing succeeded
          codesign --verify --deep --strict "$APP_PATH"

          echo "Signing complete"

      - name: Ad-hoc sign macOS DMG
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE == ''
        run: |
          DMG_PATH=$(find src-tauri/target -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "WARNING: No DMG found, skipping DMG signing"
            exit 0
          fi

          echo "Signing DMG: $DMG_PATH"
          codesign --force --sign - "$DMG_PATH"
          echo "DMG signing complete"
