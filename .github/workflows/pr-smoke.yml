# Fast PR gate: Rust compile + unit tests (no full Tauri bundle).
name: PR smoke

on:
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Linux dependencies (Tauri lib link)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (lib + unit tests)
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-fail-fast
