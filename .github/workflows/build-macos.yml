# Build Tauri app for macOS on every push. No physical Mac required.
# Secrets: TAURI_SIGNING_* (updater .sig), optional APPLE_CERTIFICATE (base64 .p12) + APPLE_CERTIFICATE_PASSWORD (code sign).
name: Build macOS
on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Download yt-dlp binary
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o src-tauri/resources/yt-dlp
          chmod +x src-tauri/resources/yt-dlp
          echo "Downloaded yt-dlp for macOS"

      - name: Validate Apple certificate secret
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret is empty"
            exit 1
          fi
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD secret is empty"
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | tr -d '\r\n\t ' | base64 --decode > /tmp/apple_cert.p12
          if [ ! -s /tmp/apple_cert.p12 ]; then
            echo "Decoded Apple certificate is empty"
            exit 1
          fi
          openssl pkcs12 -in /tmp/apple_cert.p12 -nokeys -passin pass:"$APPLE_CERTIFICATE_PASSWORD" >/dev/null

      - name: Install dependencies
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Build Tauri (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: npm run tauri build -- --bundles app,dmg --target universal-apple-darwin --config src-tauri/tauri.macos.conf.json

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-build
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
